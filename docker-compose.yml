version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: fishfarm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fishfarm
      MYSQL_USER: fishfarm
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fishfarm-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis缓存
  redis:
    image: redis:7.0-alpine
    container_name: fishfarm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fishfarm-network
    command: redis-server --appendonly yes

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fishfarm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=mysql+pymysql://root:password@mysql:3306/fishfarm
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER=host.docker.internal
      - MQTT_PORT=1883
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend:/app
    networks:
      - fishfarm-network
    # 开发模式下热重载
    command: >
      sh -c "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Nginx反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: fishfarm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - fishfarm-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  fishfarm-network:
    driver: bridge
