name: fishfarm_monitor
description: 智能渔场环境控制监测系统 - 移动端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.0.5

  # 网络请求
  dio: ^5.3.2

  # WebSocket
  web_socket_channel: ^2.4.0

  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 图表展示
  fl_chart: ^0.65.0

  # 权限管理
  permission_handler: ^11.0.1

  # 工具库
  intl: ^0.18.1
  uuid: ^4.2.1
  path_provider: ^2.1.1

  # UI组件
  flutter_slidable: ^3.0.0
  cached_network_image: ^3.3.0

  # 权限
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
