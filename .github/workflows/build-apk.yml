name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4
    
    - name: 设置Flutter环境
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
    
    - name: 安装依赖
      run: |
        cd fishfarm-system/fishfarm_app
        flutter pub get
    
    - name: 构建APK（Release版）
      run: |
        cd fishfarm-system/fishfarm_app
        flutter build apk --release
    
    - name: 上传APK
      uses: actions/upload-artifact@v4
      with:
        name: fishfarm-app-release
        path: fishfarm-system/fishfarm_app/build/app/outputs/flutter-apk/app-release.apk
    
    - name: 构建完成通知
      run: |
        echo "✅ APK构建完成！"
        echo "📦 下载地址：在Actions页面下载artifact"